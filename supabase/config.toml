# Supabase local configuration

project_id = "tellah-local"

[api]
enabled = true
port = 54321
schemas = ["public"]
max_rows = 1000

[db]
port = 54322

[studio]
enabled = true
port = 54323

[auth]
enabled = true
# Local development
site_url = "http://localhost:3000"
# Production: Update in Supabase dashboard to your Vercel URL
# https://app.supabase.com → Authentication → URL Configuration

[functions.process-generation]
# Disable JWT verification - this is an internal background job processor
# It's triggered server-side with service role key, not by end users
verify_jwt = false
