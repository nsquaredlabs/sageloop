# Sageloop Configuration
# Copy this file to sageloop.config.yaml and add your API keys

# At least one API key is required
openai_api_key: ""
anthropic_api_key: ""

# Model for generating outputs (the model you are testing)
# Options: gpt-4o, gpt-4o-mini, gpt-4.1, claude-sonnet-4-20250514, claude-haiku-4-5-20251001
output_model: "gpt-4o-mini"

# Model for system operations (pattern extraction, prompt fix integration)
# This should be a capable model — it analyzes your outputs and suggests improvements
system_model: "claude-haiku-4-5-20251001"
